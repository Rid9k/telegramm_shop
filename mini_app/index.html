<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Каталог</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--tg-theme-bg-color,#fff);
      color:var(--tg-theme-text-color,#111);
      min-height:100vh;
    }

    header{
      position:sticky;top:0;z-index:10;
      background:var(--tg-theme-bg-color,#fff);
      padding:14px 16px 10px;
      border-bottom:1px solid var(--tg-theme-hint-color,#ddd)44;
    }
    header h1{font-size:18px;font-weight:700}
    header p{font-size:12px;color:var(--tg-theme-hint-color,#999);margin-top:2px}

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      padding:12px;
    }

    .card{
      background:var(--tg-theme-secondary-bg-color,#f5f5f5);
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition:transform .15s;
    }
    .card:active{transform:scale(.97)}

    .card img{
      width:100%;aspect-ratio:1;object-fit:cover;
      background:#eee;display:block;
    }
    .card .img-placeholder{
      width:100%;aspect-ratio:1;
      display:flex;align-items:center;justify-content:center;
      font-size:48px;
      background:var(--tg-theme-secondary-bg-color,#eee);
    }
    .card .info{padding:10px 10px 12px}
    .card .cname{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px}
    .card .cprice{
      font-size:14px;font-weight:700;
      color:var(--tg-theme-button-color,#2481cc);
    }

    .empty{
      text-align:center;padding:60px 20px;
      color:var(--tg-theme-hint-color,#999);
    }
    .empty .icon{font-size:52px;margin-bottom:12px}

    .loader{
      text-align:center;padding:60px 20px;
      color:var(--tg-theme-hint-color,#999);
      font-size:15px;
    }

    /* Модалка */
    .overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.45);
      z-index:50;
      display:flex;align-items:flex-end;
      opacity:0;pointer-events:none;
      transition:opacity .2s;
    }
    .overlay.open{opacity:1;pointer-events:all}

    .modal{
      background:var(--tg-theme-bg-color,#fff);
      border-radius:20px 20px 0 0;
      width:100%;max-height:90vh;overflow-y:auto;
      padding:0 0 40px;
      transform:translateY(100%);
      transition:transform .25s;
    }
    .overlay.open .modal{transform:translateY(0)}

    .modal img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
    .modal .m-placeholder{
      width:100%;aspect-ratio:4/3;
      display:flex;align-items:center;justify-content:center;
      font-size:72px;
      background:var(--tg-theme-secondary-bg-color,#eee);
    }
    .modal .m-body{padding:18px 18px 0}
    .modal .m-name{font-size:20px;font-weight:700;margin-bottom:6px}
    .modal .m-price{
      font-size:22px;font-weight:700;
      color:var(--tg-theme-button-color,#2481cc);
      margin-bottom:12px;
    }
    .modal .m-desc{
      font-size:14px;
      color:var(--tg-theme-hint-color,#777);
      line-height:1.6;
      margin-bottom:14px;
    }
    .modal .m-sizes{
      font-size:13px;
      color:var(--tg-theme-text-color,#111);
      margin-bottom:6px;
    }
    .modal .m-sizes span{
      display:inline-block;
      background:var(--tg-theme-secondary-bg-color,#f0f0f0);
      border-radius:8px;
      padding:4px 12px;
      margin:4px 4px 0 0;
      font-weight:600;
    }
  </style>
</head>
<body>

<header>
  <h1>🛍 Каталог</h1>
  <p id="subtitle">Загрузка...</p>
</header>

<div id="content" class="loader">⏳ Загружаем товары...</div>

<!-- Модалка -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div id="mPhoto"></div>
    <div class="m-body">
      <div class="m-name"  id="mName"></div>
      <div class="m-price" id="mPrice"></div>
      <div class="m-desc"  id="mDesc"></div>
      <div class="m-sizes" id="mSizes"></div>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const API_BASE = window.location.origin;
  let products = [];

  async function loadProducts() {
    try {
      const res = await fetch(`${API_BASE}/api/products`);
      products  = await res.json();
      render();
    } catch(e) {
      document.getElementById("content").innerHTML =
        '<div class="empty"><div class="icon">😕</div><p>Не удалось загрузить товары</p></div>';
    }
  }

  function render() {
    const el = document.getElementById("content");
    document.getElementById("subtitle").textContent =
      products.length ? `${products.length} товаров` : "Пусто";

    if (!products.length) {
      el.innerHTML = '<div class="empty"><div class="icon">📭</div><p>Товаров пока нет</p></div>';
      return;
    }

    el.className = "grid";
    el.innerHTML = products.map(p => `
      <div class="card" onclick="openModal(${p.id})">
        ${p.photo_id
          ? `<img src="${API_BASE}/api/photo/${p.photo_id}" alt="${p.name}" loading="lazy"/>`
          : `<div class="img-placeholder">🛍</div>`
        }
        <div class="info">
          <div class="cname">${p.name}</div>
          <div class="cprice">${p.price.toLocaleString('ru')} ₽</div>
        </div>
      </div>
    `).join('');
  }

  function openModal(productId) {
    const p = products.find(x => x.id === productId);
    if (!p) return;

    document.getElementById("mPhoto").innerHTML = p.photo_id
      ? `<img src="${API_BASE}/api/photo/${p.photo_id}" alt="${p.name}"/>`
      : `<div class="m-placeholder">🛍</div>`;

    document.getElementById("mName").textContent  = p.name;
    document.getElementById("mPrice").textContent = p.price.toLocaleString('ru') + ' ₽';
    document.getElementById("mDesc").textContent  = p.description || '';

    const sizesEl = document.getElementById("mSizes");
    if (p.sizes && p.sizes.length) {
      sizesEl.innerHTML = '<b>Размеры:</b><br>' +
        p.sizes.map(s => `<span>${s}</span>`).join('');
    } else {
      sizesEl.innerHTML = '';
    }

    document.getElementById("overlay").classList.add("open");
    tg.HapticFeedback.impactOccurred("light");
  }

  function onOverlayClick(e) {
    if (e.target === document.getElementById("overlay"))
      document.getElementById("overlay").classList.remove("open");
  }

  loadProducts();
</script>
</body>
</html>
