<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Каталог</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--tg-theme-bg-color,#fff);
      color:var(--tg-theme-text-color,#111);
      padding-bottom:80px;
      min-height:100vh;
    }

    /* ── Шапка ── */
    header{
      position:sticky;top:0;z-index:10;
      background:var(--tg-theme-bg-color,#fff);
      padding:14px 16px 10px;
      border-bottom:1px solid var(--tg-theme-hint-color,#ddd)22;
    }
    header h1{font-size:18px;font-weight:700}
    header p{font-size:12px;color:var(--tg-theme-hint-color,#999);margin-top:2px}

    /* ── Сетка ── */
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      padding:12px 12px 0;
    }

    /* ── Карточка ── */
    .card{
      background:var(--tg-theme-secondary-bg-color,#f5f5f5);
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition:transform .15s,box-shadow .15s;
      position:relative;
    }
    .card:active{transform:scale(.97)}
    .card img{
      width:100%;aspect-ratio:1;object-fit:cover;
      background:#eee;
    }
    .card .img-placeholder{
      width:100%;aspect-ratio:1;
      display:flex;align-items:center;justify-content:center;
      font-size:48px;background:var(--tg-theme-secondary-bg-color,#eee);
    }
    .card .info{padding:10px 10px 12px}
    .card .cname{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px}
    .card .cprice{
      font-size:14px;font-weight:700;
      color:var(--tg-theme-button-color,#2481cc);
    }
    .card .cbadge{
      position:absolute;top:8px;right:8px;
      background:var(--tg-theme-button-color,#2481cc);
      color:var(--tg-theme-button-text-color,#fff);
      border-radius:50%;width:22px;height:22px;
      display:none;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;
    }
    .card.in-cart .cbadge{display:flex}

    /* ── Пустое состояние ── */
    .empty{
      text-align:center;padding:60px 20px;
      color:var(--tg-theme-hint-color,#999);
    }
    .empty .icon{font-size:52px;margin-bottom:12px}
    .empty p{font-size:15px}

    /* ── Загрузка ── */
    .loader{
      text-align:center;padding:60px 20px;
      color:var(--tg-theme-hint-color,#999);
      font-size:15px;
    }

    /* ── Корзина-бар ── */
    .cart-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--tg-theme-button-color,#2481cc);
      color:var(--tg-theme-button-text-color,#fff);
      padding:14px 20px;
      display:none;
      justify-content:space-between;
      align-items:center;
      font-size:15px;font-weight:600;
      cursor:pointer;z-index:20;
    }

    /* ── Модальное окно товара ── */
    .overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.45);
      z-index:50;
      display:flex;align-items:flex-end;
      opacity:0;pointer-events:none;
      transition:opacity .2s;
    }
    .overlay.open{opacity:1;pointer-events:all}
    .modal{
      background:var(--tg-theme-bg-color,#fff);
      border-radius:20px 20px 0 0;
      width:100%;max-height:90vh;overflow-y:auto;
      padding:0 0 32px;
      transform:translateY(100%);
      transition:transform .25s;
    }
    .overlay.open .modal{transform:translateY(0)}

    .modal img{width:100%;aspect-ratio:4/3;object-fit:cover}
    .modal .m-placeholder{
      width:100%;aspect-ratio:4/3;
      display:flex;align-items:center;justify-content:center;
      font-size:72px;background:var(--tg-theme-secondary-bg-color,#eee);
    }
    .modal .m-body{padding:16px 18px 0}
    .modal .m-name{font-size:20px;font-weight:700;margin-bottom:4px}
    .modal .m-price{
      font-size:22px;font-weight:700;
      color:var(--tg-theme-button-color,#2481cc);
      margin-bottom:10px;
    }
    .modal .m-desc{
      font-size:14px;color:var(--tg-theme-hint-color,#777);
      line-height:1.5;margin-bottom:14px;
    }

    /* Размеры */
    .sizes-label{font-size:13px;font-weight:600;margin-bottom:8px}
    .sizes{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .size-btn{
      padding:6px 14px;border-radius:8px;
      background:var(--tg-theme-secondary-bg-color,#f0f0f0);
      border:2px solid transparent;
      font-size:13px;font-weight:600;cursor:pointer;
      color:var(--tg-theme-text-color,#111);
      transition:border-color .15s;
    }
    .size-btn.selected{
      border-color:var(--tg-theme-button-color,#2481cc);
      color:var(--tg-theme-button-color,#2481cc);
    }

    /* Кол-во */
    .qty-row{
      display:flex;align-items:center;gap:16px;
      margin-bottom:16px;
    }
    .qty-row span{font-size:13px;font-weight:600}
    .qty-controls{display:flex;align-items:center;gap:12px}
    .qty-btn{
      background:var(--tg-theme-secondary-bg-color,#eee);
      border:none;border-radius:50%;
      width:36px;height:36px;font-size:20px;
      cursor:pointer;color:var(--tg-theme-text-color,#111);
    }
    .qty-num{font-size:18px;font-weight:700;min-width:28px;text-align:center}

    .add-btn{
      width:100%;
      background:var(--tg-theme-button-color,#2481cc);
      color:var(--tg-theme-button-text-color,#fff);
      border:none;border-radius:12px;
      padding:14px;font-size:16px;font-weight:600;
      cursor:pointer;
    }
    .add-btn:disabled{opacity:.5;cursor:not-allowed}
  </style>
</head>
<body>

<header>
  <h1>🛍 Каталог</h1>
  <p id="subtitle">Загрузка...</p>
</header>

<div id="content" class="loader">⏳ Загружаем товары...</div>

<div class="cart-bar" id="cartBar" onclick="goToCart()">
  <span>🛒 Корзина (<span id="cartCount">0</span> тов.)</span>
  <span id="cartTotal">0 ₽</span>
</div>

<!-- Модалка -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="modal" id="modal">
    <div id="mPhoto"></div>
    <div class="m-body">
      <div class="m-name"  id="mName"></div>
      <div class="m-price" id="mPrice"></div>
      <div class="m-desc"  id="mDesc"></div>
      <div id="sizesBlock" style="display:none">
        <div class="sizes-label">Выберите размер:</div>
        <div class="sizes" id="sizesList"></div>
      </div>
      <div class="qty-row">
        <span>Количество:</span>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="qtyNum">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <button class="add-btn" id="addBtn" onclick="addToCart()">Добавить в корзину</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// BASE_URL будет подставлен сервером
const API_BASE = window.location.origin;

let products = [];
let cart     = {};   // { "id_size": {id, name, price, qty, size} }
let current  = null;
let currentQty = 1;
let selectedSize = null;

// ── Загрузка товаров ─────────────────────────────────────────
async function loadProducts() {
  try {
    const res  = await fetch(`${API_BASE}/api/products`);
    products   = await res.json();
    render();
  } catch(e) {
    document.getElementById("content").innerHTML =
      '<div class="empty"><div class="icon">😕</div><p>Не удалось загрузить товары</p></div>';
  }
}

function render() {
  const el = document.getElementById("content");
  document.getElementById("subtitle").textContent =
    products.length ? `${products.length} товаров` : "Пусто";

  if (!products.length) {
    el.innerHTML = '<div class="empty"><div class="icon">📭</div><p>Товаров пока нет</p></div>';
    return;
  }

  el.className = "grid";
  el.innerHTML = products.map(p => `
    <div class="card ${cartQty(p.id) ? 'in-cart' : ''}" id="card-${p.id}" onclick="openModal(${p.id})">
      <span class="cbadge" id="badge-${p.id}">${cartQty(p.id)}</span>
      ${p.photo_id
        ? `<img src="${API_BASE}/api/photo/${p.photo_id}" alt="${p.name}" loading="lazy"/>`
        : `<div class="img-placeholder">🛍</div>`
      }
      <div class="info">
        <div class="cname">${p.name}</div>
        <div class="cprice">${p.price.toLocaleString('ru')} ₽</div>
      </div>
    </div>
  `).join('');
}

function cartQty(productId) {
  return Object.values(cart)
    .filter(i => i.id === productId)
    .reduce((s, i) => s + i.qty, 0);
}

// ── Модалка ──────────────────────────────────────────────────
function openModal(productId) {
  current     = products.find(p => p.id === productId);
  currentQty  = 1;
  selectedSize = null;
  if (!current) return;

  document.getElementById("mPhoto").innerHTML = current.photo_id
    ? `<img src="${API_BASE}/api/photo/${current.photo_id}" alt="${current.name}"/>`
    : `<div class="m-placeholder">🛍</div>`;

  document.getElementById("mName").textContent  = current.name;
  document.getElementById("mPrice").textContent = current.price.toLocaleString('ru') + ' ₽';
  document.getElementById("mDesc").textContent  = current.description || '';
  document.getElementById("qtyNum").textContent = 1;

  // Размеры
  const sizesBlock = document.getElementById("sizesBlock");
  const sizesList  = document.getElementById("sizesList");
  if (current.sizes && current.sizes.length) {
    sizesBlock.style.display = "block";
    sizesList.innerHTML = current.sizes.map(s =>
      `<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`
    ).join('');
    document.getElementById("addBtn").disabled = true;
  } else {
    sizesBlock.style.display = "none";
    document.getElementById("addBtn").disabled = false;
  }

  document.getElementById("overlay").classList.add("open");
  tg.HapticFeedback.impactOccurred("light");
}

function onOverlayClick(e) {
  if (e.target === document.getElementById("overlay"))
    closeModal();
}
function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}

function selectSize(size, btn) {
  selectedSize = size;
  document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  document.getElementById("addBtn").disabled = false;
}

function changeQty(delta) {
  currentQty = Math.max(1, currentQty + delta);
  document.getElementById("qtyNum").textContent = currentQty;
}

function addToCart() {
  const key = `${current.id}_${selectedSize || ''}`;
  if (cart[key]) {
    cart[key].qty += currentQty;
  } else {
    cart[key] = {
      id:    current.id,
      name:  current.name,
      price: current.price,
      qty:   currentQty,
      size:  selectedSize || '',
    };
  }
  closeModal();
  updateCartUI();
  tg.HapticFeedback.notificationOccurred("success");

  // Отправляем событие боту
  tg.sendData(JSON.stringify({
    action: "add",
    item: {
      id:    current.id,
      name:  current.name,
      price: current.price,
      qty:   currentQty,
      size:  selectedSize || '',
    }
  }));
}

function updateCartUI() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);

  // Бар
  const bar = document.getElementById("cartBar");
  bar.style.display = count > 0 ? "flex" : "none";
  document.getElementById("cartCount").textContent = count;
  document.getElementById("cartTotal").textContent = total.toLocaleString('ru') + ' ₽';

  // Бейджи на карточках
  products.forEach(p => {
    const qty   = cartQty(p.id);
    const badge = document.getElementById(`badge-${p.id}`);
    const card  = document.getElementById(`card-${p.id}`);
    if (!badge || !card) return;
    badge.textContent = qty;
    badge.style.display = qty ? "flex" : "none";
    card.classList.toggle("in-cart", qty > 0);
  });
}

function goToCart() {
  // Закрываем Mini App — пользователь нажмёт «🛒 Корзина» в боте
  tg.close();
}

loadProducts();
</script>
</body>
</html>
